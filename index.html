<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#1a0a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>Come Rosquillas - Homer's Donut Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Bangers&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #1a0a2e 0%, #0d0221 50%, #1a0a2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Bangers', 'Arial', sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #gameContainer {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            filter: drop-shadow(0 0 20px rgba(255, 216, 0, 0.3));
            max-width: 100vw;
        }
        #hud {
            width: 100%;
            max-width: 672px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: linear-gradient(180deg, #2d1b69 0%, #1a0a2e 100%);
            border: 2px solid #ffd800;
            border-bottom: none;
            border-radius: 12px 12px 0 0;
        }
        #hud .score {
            color: #ffd800;
            font-size: 22px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #000, 0 0 10px rgba(255,216,0,0.5);
        }
        #hud .level {
            color: #ff6b9d;
            font-size: 20px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #000;
        }
        #hud .lives-container {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #ff6b6b;
            font-size: 20px;
            text-shadow: 2px 2px 0 #000;
        }
        #hud .donut-icon {
            display: inline-block;
            width: 18px;
            height: 18px;
            background: radial-gradient(circle at center, #a0522d 30%, #ff69b4 35%, #ff1493 70%, #ff69b4 100%);
            border-radius: 50%;
            border: 1px solid #8b4513;
            position: relative;
        }
        #hud .donut-icon::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 5px;
            height: 5px;
            background: #1a0a2e;
            border-radius: 50%;
        }
        canvas {
            border: 2px solid #ffd800;
            display: block;
            max-width: 100vw;
            height: auto;
            touch-action: none;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
            display: none;
        }
        #message .subtitle {
            font-family: 'Bangers', Arial, sans-serif;
            font-size: 20px;
            color: #ffffff;
            margin-top: 16px;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0 #000;
            line-height: 1.6;
        }
        #message .title-large {
            font-family: 'Permanent Marker', 'Bangers', Arial, sans-serif;
            font-size: 52px;
            color: #ffd800;
            text-shadow: 3px 3px 0 #000, 0 0 20px rgba(255,216,0,0.6);
            letter-spacing: 3px;
        }
        #message .catchphrase {
            font-family: 'Permanent Marker', Arial, sans-serif;
            font-size: 28px;
            color: #ff69b4;
            margin-top: 8px;
            text-shadow: 2px 2px 0 #000;
        }
        #bottomBar {
            width: 100%;
            max-width: 672px;
            padding: 6px 16px;
            background: linear-gradient(180deg, #1a0a2e 0%, #2d1b69 100%);
            border: 2px solid #ffd800;
            border-top: none;
            border-radius: 0 0 12px 12px;
            display: flex;
            justify-content: center;
            gap: 30px;
            color: #888;
            font-size: 14px;
            font-family: 'Bangers', Arial, sans-serif;
            letter-spacing: 1px;
        }
        #bottomBar span { color: #aaa; text-shadow: 1px 1px 0 #000; }
        #bottomBar .key { color: #ffd800; }
        
        /* Settings Button */
        #settingsBtn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background: rgba(255, 216, 0, 0.25);
            border: 2px solid rgba(255, 216, 0, 0.6);
            border-radius: 50%;
            font-size: 28px;
            color: #ffd800;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        #settingsBtn:hover {
            background: rgba(255, 216, 0, 0.4);
            transform: scale(1.05);
        }
        #settingsBtn:active {
            background: rgba(255, 216, 0, 0.5);
            transform: scale(0.95);
        }
        
        /* Settings Overlay */
        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        
        .settings-modal {
            background: linear-gradient(180deg, #2d1b69 0%, #1a0a2e 100%);
            border: 3px solid #ffd800;
            border-radius: 16px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(255, 216, 0, 0.4);
            font-family: 'Bangers', Arial, sans-serif;
        }
        
        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 2px solid rgba(255, 216, 0, 0.3);
        }
        
        .settings-header h2 {
            color: #ffd800;
            font-size: 32px;
            margin: 0;
            text-shadow: 2px 2px 0 #000;
            letter-spacing: 2px;
        }
        
        .settings-close {
            background: none;
            border: none;
            color: #ff6b6b;
            font-size: 32px;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        
        .settings-close:hover {
            transform: scale(1.2);
        }
        
        .settings-content {
            padding: 20px 24px;
        }
        
        .settings-section {
            margin-bottom: 24px;
        }
        
        .settings-section h3 {
            color: #ff69b4;
            font-size: 24px;
            margin-bottom: 16px;
            text-shadow: 2px 2px 0 #000;
            letter-spacing: 1px;
        }
        
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .setting-row label {
            color: #ffffff;
            font-size: 18px;
            text-shadow: 1px 1px 0 #000;
            letter-spacing: 1px;
        }
        
        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            max-width: 250px;
        }
        
        .slider-container input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 8px;
            background: rgba(255, 216, 0, 0.2);
            border-radius: 4px;
            outline: none;
        }
        
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #ffd800;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(255, 216, 0, 0.6);
        }
        
        .slider-container input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #ffd800;
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 8px rgba(255, 216, 0, 0.6);
        }
        
        .slider-value {
            color: #ffd800;
            font-size: 16px;
            min-width: 50px;
            text-align: right;
            text-shadow: 1px 1px 0 #000;
        }
        
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .toggle-container input[type="checkbox"] {
            width: 50px;
            height: 26px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            outline: none;
            transition: background 0.3s;
        }
        
        .toggle-container input[type="checkbox"]::before {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #fff;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }
        
        .toggle-container input[type="checkbox"]:checked {
            background: #ffd800;
        }
        
        .toggle-container input[type="checkbox"]:checked::before {
            transform: translateX(24px);
        }
        
        .toggle-label {
            color: #ffd800;
            font-size: 16px;
            min-width: 40px;
            text-shadow: 1px 1px 0 #000;
        }
        
        .key-hint {
            color: #888;
            font-size: 14px;
            font-style: italic;
        }
        
        .difficulty-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }
        
        .radio-option {
            display: flex;
            align-items: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 216, 0, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .radio-option:hover {
            background: rgba(255, 216, 0, 0.1);
            border-color: rgba(255, 216, 0, 0.5);
        }
        
        .radio-option input[type="radio"] {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            cursor: pointer;
        }
        
        .radio-option input[type="radio"]:checked ~ .radio-label {
            color: #ffd800;
        }
        
        .radio-label {
            display: flex;
            flex-direction: column;
            color: #ffffff;
            transition: color 0.2s;
        }
        
        .radio-label strong {
            font-size: 18px;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0 #000;
        }
        
        .radio-label small {
            font-size: 14px;
            color: #aaa;
            font-family: Arial, sans-serif;
            margin-top: 2px;
        }
        
        .controls-display {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .control-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
        }
        
        .control-key {
            color: #ffd800;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 1px 1px 0 #000;
            letter-spacing: 2px;
        }
        
        .control-action {
            color: #ffffff;
            font-size: 16px;
            text-shadow: 1px 1px 0 #000;
        }
        
        .settings-footer {
            display: flex;
            justify-content: space-between;
            padding: 20px 24px;
            border-top: 2px solid rgba(255, 216, 0, 0.3);
            gap: 12px;
        }
        
        .settings-button {
            flex: 1;
            padding: 12px 20px;
            font-family: 'Bangers', Arial, sans-serif;
            font-size: 18px;
            letter-spacing: 1px;
            border: 2px solid;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-shadow: 1px 1px 0 #000;
        }
        
        .settings-reset {
            background: rgba(255, 107, 107, 0.2);
            border-color: #ff6b6b;
            color: #ff6b6b;
        }
        
        .settings-reset:hover {
            background: rgba(255, 107, 107, 0.4);
            transform: scale(1.02);
        }
        
        .settings-tutorial-btn {
            background: rgba(255, 105, 180, 0.2);
            border-color: #ff69b4;
            color: #ff69b4;
        }
        
        .settings-tutorial-btn:hover {
            background: rgba(255, 105, 180, 0.4);
            transform: scale(1.02);
        }
        
        .settings-save {
            background: rgba(255, 216, 0, 0.3);
            border-color: #ffd800;
            color: #ffd800;
        }
        
        .settings-save:hover {
            background: rgba(255, 216, 0, 0.5);
            transform: scale(1.02);
        }
        
        /* Responsive Settings Modal */
        @media (max-width: 700px) {
            .settings-modal {
                width: 95%;
                max-height: 90vh;
            }
            
            .settings-header h2 {
                font-size: 24px;
            }
            
            .settings-section h3 {
                font-size: 20px;
            }
            
            .setting-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            
            .slider-container {
                width: 100%;
                max-width: 100%;
            }
            
            .settings-footer {
                flex-direction: column;
            }
            
            .radio-label strong {
                font-size: 16px;
            }
            
            .radio-label small {
                font-size: 12px;
            }
        }
        
        /* Stats Dashboard Overlay */
        .stats-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.88); display: flex; align-items: center; justify-content: center; z-index: 1500; backdrop-filter: blur(4px); }
        .stats-modal { background: linear-gradient(180deg, #2d1b69 0%, #1a0a2e 100%); border: 3px solid #ffd800; border-radius: 16px; width: 90%; max-width: 680px; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(255,216,0,0.4); font-family: 'Bangers', Arial, sans-serif; }
        .stats-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 2px solid rgba(255,216,0,0.3); }
        .stats-header h2 { color: #ffd800; font-size: 28px; margin: 0; text-shadow: 2px 2px 0 #000; letter-spacing: 2px; }
        .stats-close { background: none; border: none; color: #ff6b6b; font-size: 28px; cursor: pointer; padding: 0; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
        .stats-close:hover { transform: scale(1.2); }
        .stats-tabs { display: flex; border-bottom: 2px solid rgba(255,216,0,0.15); padding: 0 24px; }
        .stats-tab { flex: 1; padding: 12px 8px; background: none; border: none; border-bottom: 3px solid transparent; color: #aaa; font-family: 'Bangers', Arial, sans-serif; font-size: 18px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
        .stats-tab:hover { color: #ffd800; }
        .stats-tab-active { color: #ffd800; border-bottom-color: #ffd800; text-shadow: 1px 1px 0 #000; }
        .stats-content { flex: 1; overflow-y: auto; padding: 16px 24px; min-height: 200px; }
        .stats-footer { display: flex; justify-content: space-between; padding: 16px 24px; border-top: 2px solid rgba(255,216,0,0.3); gap: 12px; }
        .stats-button { flex: 1; padding: 10px 16px; font-family: 'Bangers', Arial, sans-serif; font-size: 16px; letter-spacing: 1px; border: 2px solid; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-shadow: 1px 1px 0 #000; }
        .stats-clear-btn { background: rgba(255,107,107,0.15); border-color: #ff6b6b; color: #ff6b6b; }
        .stats-clear-btn:hover { background: rgba(255,107,107,0.35); }
        .stats-done-btn { background: rgba(255,216,0,0.25); border-color: #ffd800; color: #ffd800; }
        .stats-done-btn:hover { background: rgba(255,216,0,0.45); }
        .stats-cancel-btn { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.3); color: #aaa; }
        .stats-confirm-btn { background: rgba(255,107,107,0.3); border-color: #ff6b6b; color: #ff6b6b; }
        .stats-confirm { text-align: center; width: 100%; }
        .stats-empty { text-align: center; padding: 40px 0; }
        .lb-rank-banner { text-align: center; color: #ffd800; font-size: 16px; padding: 8px; margin-bottom: 12px; background: rgba(255,216,0,0.08); border-radius: 8px; border: 1px solid rgba(255,216,0,0.15); text-shadow: 1px 1px 0 #000; }
        .lb-scroll { max-height: 380px; overflow-y: auto; }
        .lb-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .lb-table thead th { color: #ff69b4; text-align: left; padding: 6px 8px; font-size: 13px; letter-spacing: 1px; border-bottom: 1px solid rgba(255,105,180,0.3); position: sticky; top: 0; background: #2d1b69; z-index: 1; }
        .lb-table tbody tr { border-bottom: 1px solid rgba(255,255,255,0.06); transition: background 0.15s; }
        .lb-table tbody tr:hover { background: rgba(255,216,0,0.06); }
        .lb-table td { color: #ccc; padding: 7px 8px; font-family: Arial, sans-serif; font-size: 14px; }
        .lb-pos { color: #aaa; font-size: 16px; text-align: center; width: 30px; }
        .lb-name { color: #ffd800; font-weight: bold; letter-spacing: 2px; font-family: 'Bangers', Arial, sans-serif; }
        .lb-score { color: #fff; font-weight: bold; }
        .lb-diff { color: #aaa; font-size: 12px; }
        .lb-date { color: #888; font-size: 12px; }
        .lb-row-top3 { background: rgba(255,216,0,0.08); }
        .lb-row-current { background: rgba(255,105,180,0.15) !important; border-left: 3px solid #ff69b4; }
        .lb-row-current .lb-name { color: #ff69b4; }
        .stats-rank-section { text-align: center; padding: 16px; margin-bottom: 16px; background: rgba(255,216,0,0.05); border-radius: 12px; border: 1px solid rgba(255,216,0,0.12); }
        .stats-rank-badge { font-size: 48px; margin-bottom: 4px; }
        .stats-rank-name { color: #ffd800; font-size: 24px; text-shadow: 2px 2px 0 #000; letter-spacing: 2px; }
        .stats-next-rank { color: #aaa; font-size: 14px; margin-top: 8px; font-family: Arial, sans-serif; }
        .stats-progress-bar { width: 80%; max-width: 300px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin: 10px auto 4px; overflow: hidden; }
        .stats-progress-fill { height: 100%; background: linear-gradient(90deg, #ffd800, #ff69b4); border-radius: 4px; transition: width 0.4s ease; }
        .stats-section { margin-bottom: 20px; }
        .stats-section h3 { color: #ff69b4; font-size: 20px; margin-bottom: 12px; text-shadow: 1px 1px 0 #000; letter-spacing: 1px; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; margin-bottom: 4px; background: rgba(255,255,255,0.03); border-radius: 6px; }
        .stat-label { color: #ccc; font-size: 16px; font-family: Arial, sans-serif; }
        .stat-value { color: #ffd800; font-size: 18px; text-shadow: 1px 1px 0 #000; }
        .stats-badges-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stats-badge { text-align: center; padding: 14px 8px; border-radius: 10px; border: 2px solid rgba(255,216,0,0.15); }
        .stats-badge-earned { background: rgba(255,216,0,0.08); border-color: rgba(255,216,0,0.3); }
        .stats-badge-locked { background: rgba(255,255,255,0.02); opacity: 0.5; }
        .stats-badge-emoji { display: block; font-size: 28px; margin-bottom: 4px; }
        .stats-badge-name { display: block; color: #ffd800; font-size: 16px; text-shadow: 1px 1px 0 #000; }
        .stats-badge-req { display: block; color: #888; font-size: 12px; font-family: Arial, sans-serif; margin-top: 2px; }
        @media (max-width: 700px) { .stats-modal { width: 95%; max-height: 90vh; } .stats-header h2 { font-size: 22px; } .stats-tab { font-size: 15px; } .lb-table { font-size: 12px; } .lb-table td { padding: 5px 4px; } .lb-diff, .lb-date { display: none; } .stats-footer { flex-direction: column; } }

        /* Tutorial Overlay */
        .tutorial-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .tutorial-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(6px);
        }

        .tutorial-card {
            position: relative;
            background: linear-gradient(180deg, #2d1b69 0%, #1a0a2e 100%);
            border: 3px solid #ffd800;
            border-radius: 20px;
            width: 90%;
            max-width: 420px;
            padding: 28px 24px 22px;
            box-shadow: 0 0 60px rgba(255, 216, 0, 0.35), 0 8px 32px rgba(0, 0, 0, 0.6);
            font-family: 'Bangers', Arial, sans-serif;
            text-align: center;
            animation: tutorialSlideIn 0.35s ease-out;
        }

        @keyframes tutorialSlideIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .tutorial-celebration {
            animation: tutorialCelebrate 0.4s ease-out;
        }

        @keyframes tutorialCelebrate {
            0% { opacity: 0; transform: scale(0.7); }
            60% { transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }

        .tutorial-progress {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .tutorial-step-label {
            color: #aaa;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .tutorial-dots {
            display: flex;
            gap: 8px;
        }

        .tutorial-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 1.5px solid rgba(255, 216, 0, 0.3);
            transition: all 0.3s;
        }

        .tutorial-dot-active {
            background: #ffd800;
            border-color: #ffd800;
            box-shadow: 0 0 8px rgba(255, 216, 0, 0.6);
        }

        .tutorial-dot-done {
            background: #44bb44;
            border-color: #44bb44;
        }

        .tutorial-icon-container {
            margin: 8px auto 12px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 216, 0, 0.15);
            overflow: hidden;
            display: inline-block;
        }

        .tutorial-icon-container canvas {
            display: block;
        }

        .tutorial-title {
            color: #ffd800;
            font-size: 28px;
            margin: 0 0 8px;
            text-shadow: 2px 2px 0 #000, 0 0 16px rgba(255, 216, 0, 0.4);
            letter-spacing: 2px;
        }

        .tutorial-text {
            color: #ffffff;
            font-size: 17px;
            line-height: 1.5;
            margin: 0 0 8px;
            text-shadow: 1px 1px 0 #000;
            font-family: Arial, sans-serif;
        }

        .tutorial-hint {
            color: #ff69b4;
            font-size: 15px;
            margin: 0 0 20px;
            font-style: italic;
            text-shadow: 1px 1px 0 #000;
            font-family: Arial, sans-serif;
        }

        .tutorial-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .tutorial-btn {
            padding: 12px 20px;
            font-family: 'Bangers', Arial, sans-serif;
            font-size: 18px;
            letter-spacing: 1px;
            border: 2px solid;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
        }

        .tutorial-skip-btn {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            color: #aaa;
            flex: 0;
            white-space: nowrap;
        }

        .tutorial-skip-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .tutorial-next-btn {
            background: rgba(255, 216, 0, 0.25);
            border-color: #ffd800;
            color: #ffd800;
            flex: 1;
        }

        .tutorial-next-btn:hover {
            background: rgba(255, 216, 0, 0.45);
            transform: scale(1.03);
            box-shadow: 0 0 16px rgba(255, 216, 0, 0.3);
        }

        .tutorial-play-btn {
            font-size: 22px;
            padding: 14px 32px;
        }

        .tutorial-tap-hint {
            color: #888;
            font-size: 13px;
            margin-top: 14px;
            font-family: Arial, sans-serif;
            animation: tutorialPulse 2s infinite;
        }

        @keyframes tutorialPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @media (max-width: 700px) {
            .tutorial-card {
                width: 95%;
                padding: 20px 16px 18px;
            }

            .tutorial-title {
                font-size: 24px;
            }

            .tutorial-text {
                font-size: 15px;
            }

            .tutorial-hint {
                font-size: 13px;
            }

            .tutorial-actions {
                flex-direction: column;
            }

            .tutorial-btn {
                font-size: 16px;
            }
        }

        /* Touch Controls - only visible on touch devices */
        #touchDpad {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 160px;
            height: 160px;
            z-index: 100;
            pointer-events: auto;
        }
        #touchDpad svg { width: 100%; height: 100%; }
        .dpad-arrow {
            transition: fill 0.08s, filter 0.08s;
        }
        .dpad-active {
            fill: rgba(255,216,0,0.85) !important;
            filter: drop-shadow(0 0 8px rgba(255,216,0,0.9));
        }

        #touchPauseBtn, #touchMuteBtn, #touchFullscreenBtn {
            display: none;
            position: fixed;
            top: 20px;
            width: 50px;
            height: 50px;
            background: rgba(255, 216, 0, 0.25);
            border: 2px solid rgba(255, 216, 0, 0.6);
            border-radius: 50%;
            font-size: 28px;
            color: #ffd800;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.1s, background 0.12s, box-shadow 0.12s;
            -webkit-tap-highlight-color: transparent;
        }
        #touchPauseBtn { right: 20px; }
        #touchMuteBtn { right: 80px; }
        #touchFullscreenBtn { right: 140px; }
        .touch-btn-active {
            transform: scale(0.88) !important;
            background: rgba(255,216,0,0.6) !important;
            box-shadow: 0 0 12px rgba(255,216,0,0.7);
        }

        /* Show touch controls on touch-capable devices */
        @media (hover: none) and (pointer: coarse) {
            #touchDpad, #touchPauseBtn, #touchMuteBtn, #touchFullscreenBtn {
                display: block;
            }
            #bottomBar {
                display: none;
            }
        }

        /* Orientation warning — portrait on touch devices */
        #orientationWarning {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(13,2,33,0.96);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            font-family: 'Bangers', Arial, sans-serif;
        }
        .orient-icon {
            font-size: 64px;
            animation: orientSpin 2s ease-in-out infinite;
        }
        @keyframes orientSpin {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
        }
        .orient-text {
            color: #ffd800;
            font-size: 24px;
            text-align: center;
            padding: 0 24px;
            text-shadow: 2px 2px 0 #000;
            letter-spacing: 1px;
        }
        @media (hover: none) and (pointer: coarse) and (orientation: portrait) {
            #orientationWarning { display: flex; }
        }

        /* Responsive scaling for mobile */
        @media (max-width: 700px) {
            body {
                align-items: flex-start;
                padding-top: 10px;
            }
            #gameContainer {
                width: 100%;
                padding: 0 5px;
            }
            #hud, #bottomBar {
                font-size: 12px;
            }
            #hud .score, #hud .level, #hud .lives-container {
                font-size: 16px;
            }
        }

        /* Small-screen (<480px) simplifications */
        @media (max-width: 480px) {
            #hud {
                padding: 6px 10px;
                border-radius: 8px 8px 0 0;
            }
            #hud .score { font-size: 14px; letter-spacing: 1px; }
            #hud .level { font-size: 13px; }
            #hud .lives-container { font-size: 14px; }
            #hud .high-score { font-size: 13px !important; }
            #bestComboDisplay { font-size: 12px !important; }
            #settingsBtn { width: 40px; height: 40px; font-size: 22px; top: 12px; left: 12px; }
            #touchPauseBtn, #touchMuteBtn, #touchFullscreenBtn {
                width: 42px; height: 42px; font-size: 22px; top: 12px;
            }
            #touchPauseBtn { right: 12px; }
            #touchMuteBtn { right: 62px; }
            #touchFullscreenBtn { right: 112px; }
            #touchDpad { width: 140px; height: 140px; bottom: 14px; left: 14px; }
            #message .title-large { font-size: 36px; }
            #message .catchphrase { font-size: 20px; }
            #message .subtitle { font-size: 16px; }
        }
    </style>
</head>
<body>
    <button id="settingsBtn" aria-label="Settings">⚙️</button>
    <div id="gameContainer">
        <div id="hud">
            <span class="score">&#127849; <span id="scoreDisplay">0</span></span>
            <span class="level">Springfield Lvl <span id="levelDisplay">1</span></span>
            <span class="high-score" style="color: #ffa500; font-size: 18px; letter-spacing: 1px; text-shadow: 2px 2px 0 #000;">
                Hi: <span id="highScoreDisplay">0</span>
            </span>
            <span id="bestComboDisplay" style="color: #ff69b4; font-size: 16px; letter-spacing: 1px; text-shadow: 2px 2px 0 #000; display: none;">
                🔥 <span id="bestComboValue">0</span>x
            </span>
            <span class="lives-container">
                <span id="livesIcons"></span>
            </span>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="bottomBar">
            <span><span class="key">&#8592;&#8593;&#8595;&#8594;</span> Move</span>
            <span><span class="key">P</span> Pause</span>
            <span><span class="key">M</span> Music</span>
            <span><span class="key">S</span> Settings</span>
            <span><span class="key">L</span> Leaderboard</span>
            <span><span class="key">ENTER</span> Start</span>
        </div>
        <div id="message"></div>
    </div>
    <!-- Load game modules in dependency order -->
    <script src="js/config.js"></script>
    <script src="js/engine/audio.js"></script>
    <script src="js/ui/settings-menu.js"></script>
    <script src="js/ui/tutorial.js"></script>
    <script src="js/ui/stats-dashboard.js"></script>
    <script src="js/engine/renderer.js"></script>
    <script src="js/engine/high-scores.js"></script>
    <script src="js/engine/touch-input.js"></script>
    <script src="js/game-logic.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
