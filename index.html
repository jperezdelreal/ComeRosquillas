<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Come Rosquillas - Homer's Donut Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Bangers&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #1a0a2e 0%, #0d0221 50%, #1a0a2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Bangers', 'Arial', sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #gameContainer {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            filter: drop-shadow(0 0 20px rgba(255, 216, 0, 0.3));
            max-width: 100vw;
        }
        #hud {
            width: 100%;
            max-width: 672px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: linear-gradient(180deg, #2d1b69 0%, #1a0a2e 100%);
            border: 2px solid #ffd800;
            border-bottom: none;
            border-radius: 12px 12px 0 0;
        }
        #hud .score {
            color: #ffd800;
            font-size: 22px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #000, 0 0 10px rgba(255,216,0,0.5);
        }
        #hud .level {
            color: #ff6b9d;
            font-size: 20px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #000;
        }
        #hud .lives-container {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #ff6b6b;
            font-size: 20px;
            text-shadow: 2px 2px 0 #000;
        }
        #hud .donut-icon {
            display: inline-block;
            width: 18px;
            height: 18px;
            background: radial-gradient(circle at center, #a0522d 30%, #ff69b4 35%, #ff1493 70%, #ff69b4 100%);
            border-radius: 50%;
            border: 1px solid #8b4513;
            position: relative;
        }
        #hud .donut-icon::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 5px;
            height: 5px;
            background: #1a0a2e;
            border-radius: 50%;
        }
        canvas {
            border: 2px solid #ffd800;
            display: block;
            max-width: 100vw;
            height: auto;
            touch-action: none;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
            display: none;
        }
        #message .subtitle {
            font-family: 'Bangers', Arial, sans-serif;
            font-size: 20px;
            color: #ffffff;
            margin-top: 16px;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0 #000;
            line-height: 1.6;
        }
        #message .title-large {
            font-family: 'Permanent Marker', 'Bangers', Arial, sans-serif;
            font-size: 52px;
            color: #ffd800;
            text-shadow: 3px 3px 0 #000, 0 0 20px rgba(255,216,0,0.6);
            letter-spacing: 3px;
        }
        #message .catchphrase {
            font-family: 'Permanent Marker', Arial, sans-serif;
            font-size: 28px;
            color: #ff69b4;
            margin-top: 8px;
            text-shadow: 2px 2px 0 #000;
        }
        #bottomBar {
            width: 100%;
            max-width: 672px;
            padding: 6px 16px;
            background: linear-gradient(180deg, #1a0a2e 0%, #2d1b69 100%);
            border: 2px solid #ffd800;
            border-top: none;
            border-radius: 0 0 12px 12px;
            display: flex;
            justify-content: center;
            gap: 30px;
            color: #888;
            font-size: 14px;
            font-family: 'Bangers', Arial, sans-serif;
            letter-spacing: 1px;
        }
        #bottomBar span { color: #aaa; text-shadow: 1px 1px 0 #000; }
        #bottomBar .key { color: #ffd800; }
        
        /* Settings Button */
        #settingsBtn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background: rgba(255, 216, 0, 0.25);
            border: 2px solid rgba(255, 216, 0, 0.6);
            border-radius: 50%;
            font-size: 28px;
            color: #ffd800;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        #settingsBtn:hover {
            background: rgba(255, 216, 0, 0.4);
            transform: scale(1.05);
        }
        #settingsBtn:active {
            background: rgba(255, 216, 0, 0.5);
            transform: scale(0.95);
        }
        
        /* Settings Overlay */
        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        
        .settings-modal {
            background: linear-gradient(180deg, #2d1b69 0%, #1a0a2e 100%);
            border: 3px solid #ffd800;
            border-radius: 16px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(255, 216, 0, 0.4);
            font-family: 'Bangers', Arial, sans-serif;
        }
        
        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 2px solid rgba(255, 216, 0, 0.3);
        }
        
        .settings-header h2 {
            color: #ffd800;
            font-size: 32px;
            margin: 0;
            text-shadow: 2px 2px 0 #000;
            letter-spacing: 2px;
        }
        
        .settings-close {
            background: none;
            border: none;
            color: #ff6b6b;
            font-size: 32px;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        
        .settings-close:hover {
            transform: scale(1.2);
        }
        
        .settings-content {
            padding: 20px 24px;
        }
        
        .settings-section {
            margin-bottom: 24px;
        }
        
        .settings-section h3 {
            color: #ff69b4;
            font-size: 24px;
            margin-bottom: 16px;
            text-shadow: 2px 2px 0 #000;
            letter-spacing: 1px;
        }
        
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .setting-row label {
            color: #ffffff;
            font-size: 18px;
            text-shadow: 1px 1px 0 #000;
            letter-spacing: 1px;
        }
        
        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            max-width: 250px;
        }
        
        .slider-container input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 8px;
            background: rgba(255, 216, 0, 0.2);
            border-radius: 4px;
            outline: none;
        }
        
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #ffd800;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(255, 216, 0, 0.6);
        }
        
        .slider-container input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #ffd800;
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 8px rgba(255, 216, 0, 0.6);
        }
        
        .slider-value {
            color: #ffd800;
            font-size: 16px;
            min-width: 50px;
            text-align: right;
            text-shadow: 1px 1px 0 #000;
        }
        
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .toggle-container input[type="checkbox"] {
            width: 50px;
            height: 26px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            outline: none;
            transition: background 0.3s;
        }
        
        .toggle-container input[type="checkbox"]::before {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #fff;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }
        
        .toggle-container input[type="checkbox"]:checked {
            background: #ffd800;
        }
        
        .toggle-container input[type="checkbox"]:checked::before {
            transform: translateX(24px);
        }
        
        .toggle-label {
            color: #ffd800;
            font-size: 16px;
            min-width: 40px;
            text-shadow: 1px 1px 0 #000;
        }
        
        .key-hint {
            color: #888;
            font-size: 14px;
            font-style: italic;
        }
        
        .difficulty-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }
        
        .radio-option {
            display: flex;
            align-items: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 216, 0, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .radio-option:hover {
            background: rgba(255, 216, 0, 0.1);
            border-color: rgba(255, 216, 0, 0.5);
        }
        
        .radio-option input[type="radio"] {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            cursor: pointer;
        }
        
        .radio-option input[type="radio"]:checked ~ .radio-label {
            color: #ffd800;
        }
        
        .radio-label {
            display: flex;
            flex-direction: column;
            color: #ffffff;
            transition: color 0.2s;
        }
        
        .radio-label strong {
            font-size: 18px;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0 #000;
        }
        
        .radio-label small {
            font-size: 14px;
            color: #aaa;
            font-family: Arial, sans-serif;
            margin-top: 2px;
        }
        
        .controls-display {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .control-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
        }
        
        .control-key {
            color: #ffd800;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 1px 1px 0 #000;
            letter-spacing: 2px;
        }
        
        .control-action {
            color: #ffffff;
            font-size: 16px;
            text-shadow: 1px 1px 0 #000;
        }
        
        .settings-footer {
            display: flex;
            justify-content: space-between;
            padding: 20px 24px;
            border-top: 2px solid rgba(255, 216, 0, 0.3);
            gap: 12px;
        }
        
        .settings-button {
            flex: 1;
            padding: 12px 20px;
            font-family: 'Bangers', Arial, sans-serif;
            font-size: 18px;
            letter-spacing: 1px;
            border: 2px solid;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-shadow: 1px 1px 0 #000;
        }
        
        .settings-reset {
            background: rgba(255, 107, 107, 0.2);
            border-color: #ff6b6b;
            color: #ff6b6b;
        }
        
        .settings-reset:hover {
            background: rgba(255, 107, 107, 0.4);
            transform: scale(1.02);
        }
        
        .settings-save {
            background: rgba(255, 216, 0, 0.3);
            border-color: #ffd800;
            color: #ffd800;
        }
        
        .settings-save:hover {
            background: rgba(255, 216, 0, 0.5);
            transform: scale(1.02);
        }
        
        /* Responsive Settings Modal */
        @media (max-width: 700px) {
            .settings-modal {
                width: 95%;
                max-height: 90vh;
            }
            
            .settings-header h2 {
                font-size: 24px;
            }
            
            .settings-section h3 {
                font-size: 20px;
            }
            
            .setting-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            
            .slider-container {
                width: 100%;
                max-width: 100%;
            }
            
            .settings-footer {
                flex-direction: column;
            }
            
            .radio-label strong {
                font-size: 16px;
            }
            
            .radio-label small {
                font-size: 12px;
            }
        }
        
        /* Touch Controls - only visible on touch devices */
        #touchDpad {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            z-index: 100;
            pointer-events: auto;
        }
        #touchPauseBtn, #touchMuteBtn {
            display: none;
            position: fixed;
            top: 20px;
            width: 50px;
            height: 50px;
            background: rgba(255, 216, 0, 0.25);
            border: 2px solid rgba(255, 216, 0, 0.6);
            border-radius: 50%;
            font-size: 28px;
            color: #ffd800;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.1s, background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        #touchPauseBtn {
            right: 80px;
        }
        #touchMuteBtn {
            right: 20px;
        }
        #touchPauseBtn:active, #touchMuteBtn:active {
            background: rgba(255, 216, 0, 0.5);
        }
        
        /* Show touch controls on touch-capable devices */
        @media (hover: none) and (pointer: coarse) {
            #touchDpad, #touchPauseBtn, #touchMuteBtn {
                display: block;
            }
            #bottomBar {
                font-size: 12px;
                gap: 15px;
            }
        }
        
        /* Responsive scaling for mobile */
        @media (max-width: 700px) {
            body {
                align-items: flex-start;
                padding-top: 10px;
            }
            #gameContainer {
                width: 100%;
                padding: 0 5px;
            }
            #hud, #bottomBar {
                font-size: 12px;
            }
            #hud .score, #hud .level, #hud .lives-container {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <button id="settingsBtn" aria-label="Settings">⚙️</button>
    <div id="gameContainer">
        <div id="hud">
            <span class="score">&#127849; <span id="scoreDisplay">0</span></span>
            <span class="level">Springfield Lvl <span id="levelDisplay">1</span></span>
            <span class="high-score" style="color: #ffa500; font-size: 18px; letter-spacing: 1px; text-shadow: 2px 2px 0 #000;">
                Hi: <span id="highScoreDisplay">0</span>
            </span>
            <span id="bestComboDisplay" style="color: #ff69b4; font-size: 16px; letter-spacing: 1px; text-shadow: 2px 2px 0 #000; display: none;">
                🔥 <span id="bestComboValue">0</span>x
            </span>
            <span class="lives-container">
                <span id="livesIcons"></span>
            </span>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="bottomBar">
            <span><span class="key">&#8592;&#8593;&#8595;&#8594;</span> Move</span>
            <span><span class="key">P</span> Pause</span>
            <span><span class="key">M</span> Music</span>
            <span><span class="key">S</span> Settings</span>
            <span><span class="key">ENTER</span> Start</span>
        </div>
        <div id="message"></div>
    </div>
    <!-- Load game modules in dependency order -->
    <script src="js/config.js"></script>
    <script src="js/engine/audio.js"></script>
    <script src="js/ui/settings-menu.js"></script>
    <script src="js/engine/renderer.js"></script>
    <script src="js/engine/high-scores.js"></script>
    <script src="js/engine/touch-input.js"></script>
    <script src="js/game-logic.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
