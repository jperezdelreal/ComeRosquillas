<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Come Rosquillas - Homer's Donut Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Bangers&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #1a0a2e 0%, #0d0221 50%, #1a0a2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Bangers', 'Arial', sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #gameContainer {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            filter: drop-shadow(0 0 20px rgba(255, 216, 0, 0.3));
            max-width: 100vw;
        }
        #hud {
            width: 100%;
            max-width: 672px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: linear-gradient(180deg, #2d1b69 0%, #1a0a2e 100%);
            border: 2px solid #ffd800;
            border-bottom: none;
            border-radius: 12px 12px 0 0;
        }
        #hud .score {
            color: #ffd800;
            font-size: 22px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #000, 0 0 10px rgba(255,216,0,0.5);
        }
        #hud .level {
            color: #ff6b9d;
            font-size: 20px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #000;
        }
        #hud .lives-container {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #ff6b6b;
            font-size: 20px;
            text-shadow: 2px 2px 0 #000;
        }
        #hud .donut-icon {
            display: inline-block;
            width: 18px;
            height: 18px;
            background: radial-gradient(circle at center, #a0522d 30%, #ff69b4 35%, #ff1493 70%, #ff69b4 100%);
            border-radius: 50%;
            border: 1px solid #8b4513;
            position: relative;
        }
        #hud .donut-icon::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 5px;
            height: 5px;
            background: #1a0a2e;
            border-radius: 50%;
        }
        canvas {
            border: 2px solid #ffd800;
            display: block;
            max-width: 100vw;
            height: auto;
            touch-action: none;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
            display: none;
        }
        #message .subtitle {
            font-family: 'Bangers', Arial, sans-serif;
            font-size: 20px;
            color: #ffffff;
            margin-top: 16px;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0 #000;
            line-height: 1.6;
        }
        #message .title-large {
            font-family: 'Permanent Marker', 'Bangers', Arial, sans-serif;
            font-size: 52px;
            color: #ffd800;
            text-shadow: 3px 3px 0 #000, 0 0 20px rgba(255,216,0,0.6);
            letter-spacing: 3px;
        }
        #message .catchphrase {
            font-family: 'Permanent Marker', Arial, sans-serif;
            font-size: 28px;
            color: #ff69b4;
            margin-top: 8px;
            text-shadow: 2px 2px 0 #000;
        }
        #bottomBar {
            width: 100%;
            max-width: 672px;
            padding: 6px 16px;
            background: linear-gradient(180deg, #1a0a2e 0%, #2d1b69 100%);
            border: 2px solid #ffd800;
            border-top: none;
            border-radius: 0 0 12px 12px;
            display: flex;
            justify-content: center;
            gap: 30px;
            color: #888;
            font-size: 14px;
            font-family: 'Bangers', Arial, sans-serif;
            letter-spacing: 1px;
        }
        #bottomBar span { color: #aaa; text-shadow: 1px 1px 0 #000; }
        #bottomBar .key { color: #ffd800; }
        
        /* Touch Controls - only visible on touch devices */
        #touchDpad {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            z-index: 100;
            pointer-events: auto;
        }
        #touchPauseBtn, #touchMuteBtn {
            display: none;
            position: fixed;
            top: 20px;
            width: 50px;
            height: 50px;
            background: rgba(255, 216, 0, 0.25);
            border: 2px solid rgba(255, 216, 0, 0.6);
            border-radius: 50%;
            font-size: 28px;
            color: #ffd800;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.1s, background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        #touchPauseBtn {
            right: 80px;
        }
        #touchMuteBtn {
            right: 20px;
        }
        #touchPauseBtn:active, #touchMuteBtn:active {
            background: rgba(255, 216, 0, 0.5);
        }
        
        /* Show touch controls on touch-capable devices */
        @media (hover: none) and (pointer: coarse) {
            #touchDpad, #touchPauseBtn, #touchMuteBtn {
                display: block;
            }
            #bottomBar {
                font-size: 12px;
                gap: 15px;
            }
        }
        
        /* Responsive scaling for mobile */
        @media (max-width: 700px) {
            body {
                align-items: flex-start;
                padding-top: 10px;
            }
            #gameContainer {
                width: 100%;
                padding: 0 5px;
            }
            #hud, #bottomBar {
                font-size: 12px;
            }
            #hud .score, #hud .level, #hud .lives-container {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="hud">
            <span class="score">&#127849; <span id="scoreDisplay">0</span></span>
            <span class="level">Springfield Lvl <span id="levelDisplay">1</span></span>
            <span class="lives-container">
                <span id="livesIcons"></span>
            </span>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="bottomBar">
            <span><span class="key">&#8592;&#8593;&#8595;&#8594;</span> Move</span>
            <span><span class="key">P</span> Pause</span>
            <span><span class="key">M</span> Music</span>
            <span><span class="key">ENTER</span> Start</span>
        </div>
        <div id="message"></div>
    </div>
    <!-- Load game modules in dependency order -->
    <script src="js/config.js"></script>
    <script src="js/engine/audio.js"></script>
    <script src="js/engine/renderer.js"></script>
    <script src="js/engine/touch-input.js"></script>
    <script src="js/game-logic.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
